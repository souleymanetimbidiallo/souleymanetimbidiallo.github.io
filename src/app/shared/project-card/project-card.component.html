<article class="project-card" [class.project-card--with-media]="project.coverImage">
  <div class="project-image" *ngIf="project.coverImage"><img [ngSrc]="project.coverImage" width="700" height="400" [alt]="title" loading="lazy" /></div>
  <div class="project-body">
    <div class="topline"><span>{{ ('project.type.' + project.projectType) | t }}</span><app-project-status [status]="project.status"></app-project-status></div>
    <h3>{{ title }}</h3><p>{{ summary }}</p>
    <ul><li *ngFor="let technology of technologies">{{ technologyLabel(technology) }}</li></ul>
    <div class="actions"><a [routerLink]="['/projets', project.slug]">{{ 'portfolio.viewDetails' | t }} <i class="bi bi-arrow-right" aria-hidden="true"></i></a><a *ngIf="project.repository" [href]="project.repository" target="_blank" rel="noopener noreferrer" [attr.aria-label]="'GitHub — ' + title">GitHub</a><a *ngIf="project.demo" [href]="project.demo" target="_blank" rel="noopener noreferrer" [attr.aria-label]="('project.demo' | t) + ' — ' + title">{{ 'project.demo' | t }}</a></div>
  </div>
</article>
