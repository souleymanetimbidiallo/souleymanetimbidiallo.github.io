<section id="contact" class="contact section" aria-labelledby="contact-title">
  <div class="container">
    <div class="contact-panel">
      <div><p class="section-eyebrow">Contact</p><h2 id="contact-title">{{ 'contact.title' | t }}</h2><p>{{ 'contact.lead' | t }}</p></div>
      <div class="contact-actions">
        <a class="btn btn-primary" href="mailto:souleymanetimbidiallo@gmail.com"><i class="bi bi-envelope" aria-hidden="true"></i>{{ 'contact.email' | t }}</a>
        <a href="https://www.linkedin.com/in/souleymanetimbidiallo/" target="_blank" rel="noopener noreferrer">LinkedIn <i class="bi bi-arrow-up-right" aria-hidden="true"></i></a>
        <a href="https://github.com/souleymanetimbidiallo" target="_blank" rel="noopener noreferrer">GitHub <i class="bi bi-arrow-up-right" aria-hidden="true"></i></a>
        <a [href]="resumeUrl" download>{{ 'contact.resume' | t }} <i class="bi bi-download" aria-hidden="true"></i></a>
      </div>
    </div>
  </div>
</section>
