<header id="header" class="site-header" [class.header-scrolled]="isScrolled">
  <div class="container header-inner">
    <a class="brand" routerLink="/" fragment="hero" (click)="closeMobileNav()" aria-label="Souleymane Diallo — Home">
      <span class="brand-mark" aria-hidden="true">SD</span>
      <span>Souleymane Diallo</span>
    </a>

    <button class="mobile-nav-toggle" type="button" [attr.aria-label]="(mobileNavOpen ? 'nav.close' : 'nav.open') | t" aria-controls="primary-navigation" [attr.aria-expanded]="mobileNavOpen" (click)="toggleMobileNav()">
      <i class="bi" [ngClass]="mobileNavOpen ? 'bi-x-lg' : 'bi-list'" aria-hidden="true"></i>
    </button>

    <nav id="primary-navigation" class="navbar" [class.navbar-mobile]="mobileNavOpen" [attr.aria-label]="'nav.primary' | t">
      <ul>
        <li><a routerLink="/" fragment="hero" (click)="closeMobileNav()">{{ 'nav.home' | t }}</a></li>
        <li><a routerLink="/" fragment="timeline" (click)="closeMobileNav()">{{ 'nav.timeline' | t }}</a></li>
        <li><a routerLink="/" fragment="portfolio" (click)="closeMobileNav()">{{ 'nav.projects' | t }}</a></li>
        <li><a routerLink="/" fragment="skills" (click)="closeMobileNav()">{{ 'nav.skills' | t }}</a></li>
        <li><a routerLink="/" fragment="about" (click)="closeMobileNav()">{{ 'nav.about' | t }}</a></li>
        <li><a routerLink="/" fragment="contact" (click)="closeMobileNav()">{{ 'nav.contact' | t }}</a></li>
      </ul>
      <div class="header-controls">
        <label class="theme-control" for="theme-preference">
          <span>{{ 'theme.label' | t }}</span>
          <select id="theme-preference" [value]="themeService.preference()" [attr.aria-label]="'theme.label' | t" (change)="setTheme($event)">
            <option value="system">{{ 'theme.system' | t }}</option>
            <option value="light">{{ 'theme.light' | t }}</option>
            <option value="dark">{{ 'theme.dark' | t }}</option>
          </select>
        </label>
        <button class="lang-switch-btn" type="button" [attr.aria-label]="'nav.language' | t" (click)="languageService.toggleLanguage()">
          {{ languageService.language() === 'fr' ? 'EN' : 'FR' }}
        </button>
      </div>
    </nav>
  </div>
</header>
