<section class="hero" aria-label="Hero">
  <div class="hero__overlay"></div>

  <div class="container hero__content">
    <p class="hero__kicker">Software Engineer · Tech Enthusiast</p>

    <h1 class="hero__title">Souleymane Diallo</h1>

    <p class="hero__lead">
      {{ 'hero.lead' | t }}
      <br>
      <span class="rotator" [attr.data-items]="'hero.rotator' | t"></span>
    </p>

    <div class="hero__cta">
      <a class="btn btn-outline-light ms-2" href="#portfolio">{{ 'hero.projects' | t }}</a>
      <a href="https://github.com/souleymanetimbidiallo" target="_blank" class="btn btn-outline-light">
        <i class="bi bi-github"></i> GitHub
      </a>
      <a href="https://linkedin.com/in/souleymanetimbidiallo" target="_blank" class="btn btn-outline-light">
        <i class="bi bi-linkedin"></i> LinkedIn
      </a>
      <a
        class="btn btn-outline-primary"
        [href]="cvUrl"
        [attr.download]="cvDownloadName"
      >
        {{ 'hero.cv' | t }}
      </a>
    </div>
  </div>
</section>
