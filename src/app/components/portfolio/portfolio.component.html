<section id="portfolio" class="portfolio section" aria-labelledby="projects-title">
  <div class="container">
    <div class="section-header section-header--row">
      <div><p class="section-eyebrow">{{ 'portfolio.eyebrow' | t }}</p><h2 id="projects-title">{{ 'portfolio.title' | t }}</h2></div>
      <p>{{ 'portfolio.subtitle' | t }}</p>
    </div>

    <section class="featured" *ngIf="selectedCategory === 'all' && featuredProjects.length" aria-labelledby="featured-title">
      <header class="subsection-header"><h3 id="featured-title">{{ 'portfolio.featured' | t }}</h3><p>{{ 'portfolio.featuredIntro' | t }}</p></header>
      <div class="featured-list"><app-featured-project-card *ngFor="let project of featuredProjects" [project]="project"></app-featured-project-card></div>
    </section>

    <section class="project-index" aria-labelledby="project-index-title">
      <header class="index-header"><div><h3 id="project-index-title">{{ (selectedCategory === 'all' ? 'portfolio.selected' : 'portfolio.filtered') | t }}</h3><p>{{ 'portfolio.indexIntro' | t }}</p></div>
        <div class="filters" role="group" [attr.aria-label]="'portfolio.filterLabel' | t"><button *ngFor="let category of categories" type="button" [class.active]="selectedCategory === category" [attr.aria-pressed]="selectedCategory === category" (click)="filterByCategory(category)">{{ getCategoryLabel(category) }}</button></div>
      </header>
      <div class="project-grid"><app-project-card *ngFor="let project of displayedProjects" [project]="project"></app-project-card></div>
    </section>
  </div>
</section>
