<section id="about" class="about section">
  <div class="container grid">
    <div class="profile">
      <img src="assets/img/profil.jpeg" alt="Souleymane Diallo" class="avatar">
      <h3>Souleymane Diallo</h3>
      <p class="role">{{ 'about.role' | t }}</p>
      <p class="location"><i class="bi bi-geo-alt"></i> Rennes, France</p>

      <div class="skills">
        <h4>{{ 'about.skills' | t }}</h4>
        <div class="tags">
          <span class="tag">Java</span>
          <span class="tag">Spring Boot</span>
          <span class="tag">Angular</span>
          <span class="tag">NodeJS</span>
          <span class="tag">Docker</span>
          <span class="tag">Data Science</span>
        </div>
      </div>
    </div>

    <div class="bio">
      <h6 class="title-a">{{ 'about.title' | t }}</h6>
      <p>{{ 'about.p1' | t }}</p>
      <p>{{ 'about.p2' | t }}</p>
      <p>{{ 'about.p3' | t }}</p>
    </div>
  </div>
</section>
